<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 16px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #c92128;
      letter-spacing: -0.3px;
    }

    .refresh-info {
      font-size: 14px;
      color: #999;
    }

    /* Sidebar */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 200px;
      background: #fff;
      border-right: 1px solid #e5e5e5;
      z-index: 50;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .sidebar-title {
      font-size: 14px;
      font-weight: 700;
      color: #c92128;
      padding: 16px 16px 12px;
      letter-spacing: -0.2px;
      border-bottom: 1px solid #e5e5e5;
    }

    .sidebar-list {
      list-style: none;
      flex: 1;
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      border-left: 3px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .sidebar-item:hover {
      background: #fafafa;
    }

    .sidebar-item.active {
      background: #fef2f2;
      border-left-color: #c92128;
      color: #c92128;
      font-weight: 700;
    }

    .sidebar-item-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-count {
      font-size: 11px;
      color: #999;
      font-weight: 600;
    }

    .sidebar-badge {
      font-size: 10px;
      font-weight: 700;
      background: #c92128;
      color: #fff;
      border-radius: 99px;
      padding: 1px 6px;
      min-width: 18px;
      text-align: center;
    }

    /* Layout with sidebar */
    .layout-wrapper {
      margin-left: 200px;
    }

    .dashboard {
      padding: 32px 16px 64px;
      max-width: 660px;
      margin: 0 auto;
    }

    /* Mobile: sidebar becomes top bar */
    .mobile-topbar {
      display: none;
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      overflow-x: auto;
      white-space: nowrap;
      padding: 8px 12px;
      gap: 4px;
    }

    .mobile-topbar-item {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      color: #444;
      background: #f5f5f5;
      border: 1px solid #e5e5e5;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s;
    }

    .mobile-topbar-item.active {
      background: #c92128;
      color: #fff;
      border-color: #c92128;
    }

    .mobile-topbar-item .sidebar-badge {
      font-size: 9px;
      padding: 0 5px;
    }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .layout-wrapper { margin-left: 0; }
      .mobile-topbar { display: flex; }
    }

    /* Project groups */
    .project-group { margin-bottom: 32px; }

    .project-header {
      font-size: 14px;
      font-weight: 700;
      color: #c92128;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e5e5;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Card - vertical stack */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: #ccc;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* Header row */
    .card-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .task-name {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }

    .branch {
      font-size: 14px;
      color: #999;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .badge-done { background: #ecfdf5; color: #059669; }
    .badge-running { background: #fffbeb; color: #d97706; }
    .badge-failed { background: #fef2f2; color: #dc2626; }
    .badge-pending { background: #f4f4f5; color: #71717a; }
    .badge-http-ok { background: #ecfdf5; color: #059669; }
    .badge-http-err { background: #fef2f2; color: #dc2626; }
    .badge-http-off { background: #f4f4f5; color: #a1a1aa; }

    .url-link {
      color: #c92128;
      text-decoration: none;
      font-size: 14px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .url-link:hover { text-decoration: underline; }

    /* Card body sections */
    .card-body {
      padding: 0 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .summary-text {
      font-size: 16px;
      font-weight: 500;
      color: #222;
      line-height: 1.5;
    }

    .section-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #c92128;
      margin-bottom: 6px;
    }

    .section-content {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .checklist {
      list-style: none;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .checklist li {
      color: #444;
      padding-left: 18px;
      position: relative;
      line-height: 1.5;
    }

    .checklist li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c92128;
    }

    /* Collapsible sections */
    .collapsible-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .collapsible-header .section-title {
      margin-bottom: 0;
    }

    .toggle-icon {
      font-size: 14px;
      color: #999;
      width: 16px;
      transition: transform 0.15s;
    }

    .collapsible-body {
      display: none;
      margin-top: 8px;
    }

    .collapsible-body.open {
      display: block;
    }

    .agent-log {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 12px 14px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre;
    }

    .agent-log::-webkit-scrollbar { width: 5px; }
    .agent-log::-webkit-scrollbar-track { background: transparent; }
    .agent-log::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    /* Tmux / Live Output */
    .tmux-section {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      overflow: hidden;
    }

    .tmux-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #f7f7f7;
      border-bottom: 1px solid #e5e5e5;
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tmux-output {
      background: #f7f7f7;
      padding: 10px 14px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre;
    }

    .tmux-ended {
      padding: 8px 14px;
      font-size: 14px;
      color: #aaa;
      text-align: center;
      background: #f7f7f7;
    }

    /* Screenshots row */
    .screenshots-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .screenshot-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
      max-width: 50%;
    }

    .screenshot-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 4px;
      width: fit-content;
    }

    .screenshot-badge-app { background: #eef2ff; color: #4f46e5; }
    .screenshot-badge-figma { background: #fdf2f8; color: #db2777; }

    .screenshot-thumb {
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
      transition: border-color 0.15s;
    }

    .screenshot-thumb:hover { border-color: #bbb; }
    .screenshot-thumb img { width: 100%; display: block; }

    /* Timestamp */
    .card-footer {
      padding: 0 24px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .timestamp {
      font-size: 14px;
      color: #aaa;
    }

    /* Screenshot overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 100;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .overlay img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #999;
      font-size: 16px;
    }

    /* Suggestions */
    .suggestions-panel {
      margin-bottom: 16px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      background: #fff;
      overflow: hidden;
    }

    .suggestions-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      cursor: pointer;
      user-select: none;
      background: #fafafa;
      border-bottom: 1px solid #e5e5e5;
    }

    .suggestions-header .section-title {
      margin-bottom: 0;
      font-size: 14px;
    }

    .suggestions-body { display: block; }
    .suggestions-body.collapsed { display: none; }

    .suggestion-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid #f0f0f0;
      transition: opacity 0.3s;
    }

    .suggestion-row:last-child { border-bottom: none; }
    .suggestion-row.rejected { opacity: 0.35; }

    .priority-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      margin-top: 2px;
    }

    .priority-high { background: #fef2f2; color: #dc2626; }
    .priority-medium { background: #fffbeb; color: #d97706; }
    .priority-low { background: #f4f4f5; color: #71717a; }

    .suggestion-content { flex: 1; min-width: 0; }

    .suggestion-title {
      font-size: 14px;
      font-weight: 600;
      color: #222;
    }

    .suggestion-desc {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
      line-height: 1.4;
    }

    .suggestion-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .suggestion-actions button {
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-approve { background: #ecfdf5; color: #059669; }
    .btn-approve:hover { background: #d1fae5; }
    .btn-reject { background: #fef2f2; color: #dc2626; }
    .btn-reject:hover { background: #fee2e2; }

    .suggestion-queued {
      font-size: 12px;
      font-weight: 600;
      color: #d97706;
      white-space: nowrap;
      margin-top: 2px;
    }

    .suggestions-empty {
      padding: 12px 20px;
      font-size: 13px;
      color: #aaa;
      font-style: italic;
    }

    /* Add suggestion form */
    .add-suggestion-btn {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 8px 16px;
      margin: 8px 20px 12px;
      font-size: 13px;
      font-weight: 600;
      color: #c92128;
      background: none;
      border: 1px dashed #ddd;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }

    .add-suggestion-btn:hover {
      background: #fef2f2;
      border-color: #c92128;
    }

    .add-suggestion-form {
      display: none;
      padding: 12px 20px 16px;
      border-top: 1px solid #f0f0f0;
    }

    .add-suggestion-form.open { display: block; }

    .add-suggestion-form input,
    .add-suggestion-form textarea,
    .add-suggestion-form select {
      display: block;
      width: 100%;
      margin-bottom: 8px;
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-family: inherit;
      resize: vertical;
    }

    .add-suggestion-form textarea { min-height: 48px; }

    .add-suggestion-form select { width: auto; }

    .add-form-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn-submit-suggestion {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      background: #c92128;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-submit-suggestion:hover { background: #a91b21; }

    .btn-cancel-suggestion {
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      color: #666;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
    }

    /* Toast notification */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #111;
      color: #fff;
      padding: 12px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }

    .toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.error { background: #dc2626; }

    .suggestion-spawning {
      font-size: 12px;
      font-weight: 600;
      color: #059669;
      white-space: nowrap;
      margin-top: 2px;
    }
  </style>
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar" id="sidebar"></nav>

  <!-- Mobile top bar -->
  <div class="mobile-topbar" id="mobile-topbar"></div>

  <div class="layout-wrapper">
    <header>
      <h1>Tasks Dashboard</h1>
      <div class="refresh-info">Auto-refresh 5s</div>
    </header>
    <div class="dashboard" id="dashboard"></div>
  </div>

  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <img id="overlay-img" src="" alt="">
  </div>
  <div class="toast" id="toast"></div>

  <script>
    const activeTmux = {};
    let activeFilter = null; // null = all projects
    let refreshTimer = null;
    let formOpen = false;

    function showToast(msg, isError) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast' + (isError ? ' error' : '');
      // Force reflow for animation
      void el.offsetWidth;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 3000);
    }

    function pauseAutoRefresh() {
      formOpen = true;
      if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
    }

    function resumeAutoRefresh() {
      formOpen = false;
      if (!refreshTimer) refreshTimer = setInterval(refresh, 5000);
    }

    function esc(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }

    function statusBadge(status) {
      const s = (status || 'pending').toLowerCase();
      const map = { done: 'Done', running: 'Running', failed: 'Failed', pending: 'Pending' };
      return '<span class="badge badge-' + s + '">' + (map[s] || s) + '</span>';
    }

    function httpBadge(port, status) {
      if (!port) return '<span class="badge badge-http-off">No port</span>';
      if (status && status >= 200 && status < 400)
        return '<span class="badge badge-http-ok">' + status + '</span>';
      if (status)
        return '<span class="badge badge-http-err">' + status + '</span>';
      return '<span class="badge badge-http-off">Offline</span>';
    }

    function deriveProject(name) {
      const i = name.indexOf('-');
      return i > 0 ? name.substring(0, i).toUpperCase() : 'OTHER';
    }

    function showScreenshot(src) {
      document.getElementById('overlay-img').src = src;
      document.getElementById('overlay').classList.add('active');
    }

    async function updateSuggestion(project, id, status, title, description) {
      try {
        await fetch('/api/suggestions/' + encodeURIComponent(project) + '/' + encodeURIComponent(id), {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status: status })
        });

        if (status === 'approved') {
          // Update UI immediately to show spawning state
          const btn = event.target;
          const actions = btn.closest('.suggestion-actions');
          if (actions) actions.innerHTML = '<div class="suggestion-spawning">Spawning...</div>';

          try {
            const res = await fetch('/api/spawn-agent', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ project, id, title: title || '', description: description || '' })
            });
            const data = await res.json();
            if (data.success) {
              showToast('Agent spawned: ' + data.session);
            } else {
              showToast('Spawn failed: ' + (data.error || 'unknown'), true);
            }
          } catch (err) {
            showToast('Spawn error: ' + err.message, true);
          }
        }

        refresh();
      } catch (err) {
        console.error('Failed to update suggestion:', err);
        showToast('Failed to update suggestion', true);
      }
    }

    function toggleAddForm(btn) {
      const form = btn.nextElementSibling;
      const isOpen = form.classList.toggle('open');
      btn.style.display = isOpen ? 'none' : '';
      if (isOpen) pauseAutoRefresh();
      else resumeAutoRefresh();
    }

    async function submitSuggestion(project, formEl) {
      const title = formEl.querySelector('.sug-title').value.trim();
      const desc = formEl.querySelector('.sug-desc').value.trim();
      const priority = formEl.querySelector('.sug-priority').value;
      if (!title) return;

      try {
        await fetch('/api/suggestions/' + encodeURIComponent(project), {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description: desc, priority })
        });
        formEl.classList.remove('open');
        const btn = formEl.previousElementSibling;
        if (btn) btn.style.display = '';
        resumeAutoRefresh();
        refresh();
      } catch (err) {
        console.error('Failed to add suggestion:', err);
      }
    }

    function cancelAddForm(formEl) {
      formEl.classList.remove('open');
      const btn = formEl.previousElementSibling;
      if (btn) btn.style.display = '';
      resumeAutoRefresh();
    }

    function renderSuggestions(project, suggestions) {
      const items = (suggestions || []);
      const pendingCount = items.filter(s => s.status === 'pending').length;
      let h = '<div class="suggestions-panel">';
      h += '<div class="suggestions-header" onclick="toggleSuggestions(this)">';
      h += '<span class="toggle-icon">\u25BC</span>';
      h += '<div class="section-title">Suggested Tasks (' + items.length + ')</div>';
      h += '</div>';
      h += '<div class="suggestions-body">';
      if (!items.length) {
        h += '<div class="suggestions-empty">No suggestions yet</div>';
      } else {
        for (const s of items) {
          const cls = s.status === 'rejected' ? ' rejected' : '';
          h += '<div class="suggestion-row' + cls + '">';
          h += '<span class="priority-badge priority-' + esc(s.priority) + '">' + esc(s.priority) + '</span>';
          h += '<div class="suggestion-content">';
          h += '<div class="suggestion-title">' + esc(s.title) + '</div>';
          if (s.description) h += '<div class="suggestion-desc">' + esc(s.description) + '</div>';
          h += '</div>';
          if (s.status === 'approved') {
            h += '<div class="suggestion-spawning">Running</div>';
          } else if (s.status === 'pending') {
            h += '<div class="suggestion-actions">';
            h += '<button class="btn-approve" onclick="updateSuggestion(\'' + esc(project) + '\',\'' + esc(s.id) + '\',\'approved\',\'' + esc(s.title).replace(/'/g, "\\'") + '\',\'' + esc(s.description).replace(/'/g, "\\'") + '\')">Approve</button>';
            h += '<button class="btn-reject" onclick="updateSuggestion(\'' + esc(project) + '\',\'' + esc(s.id) + '\',\'rejected\')">Reject</button>';
            h += '</div>';
          }
          h += '</div>';
        }
      }
      // Add suggestion button + form
      const formId = 'add-form-' + project.replace(/[^a-z0-9]/gi, '_');
      h += '<button class="add-suggestion-btn" onclick="toggleAddForm(this)">+ Add suggestion</button>';
      h += '<div class="add-suggestion-form" id="' + formId + '">';
      h += '<input class="sug-title" type="text" placeholder="Suggestion title...">';
      h += '<textarea class="sug-desc" placeholder="Description (optional)"></textarea>';
      h += '<div class="add-form-actions">';
      h += '<select class="sug-priority"><option value="medium">Medium</option><option value="high">High</option><option value="low">Low</option></select>';
      h += '<button class="btn-submit-suggestion" onclick="submitSuggestion(\'' + esc(project) + '\', this.closest(\'.add-suggestion-form\'))">Add</button>';
      h += '<button class="btn-cancel-suggestion" onclick="cancelAddForm(this.closest(\'.add-suggestion-form\'))">Cancel</button>';
      h += '</div>';
      h += '</div>';
      h += '</div></div>';
      return h;
    }

    function toggleSuggestions(btn) {
      const body = btn.nextElementSibling;
      const icon = btn.querySelector('.toggle-icon');
      const isCollapsed = body.classList.toggle('collapsed');
      icon.textContent = isCollapsed ? '\u25B6' : '\u25BC';
    }

    function toggleCollapsible(btn) {
      const body = btn.nextElementSibling;
      const icon = btn.querySelector('.toggle-icon');
      const isOpen = body.classList.toggle('open');
      icon.textContent = isOpen ? '\u25BC' : '\u25B6';
    }

    function setFilter(project) {
      activeFilter = project;
      refresh();
    }

    function renderSidebar(groups, suggestions) {
      // Collect all projects from tasks and suggestions
      const allProjects = new Set();
      for (const p of Object.keys(groups)) allProjects.add(p);
      for (const key of Object.keys(suggestions)) allProjects.add(key.toUpperCase());
      const sorted = Array.from(allProjects).sort();

      // Sidebar
      let sh = '<div class="sidebar-title">Projects</div>';
      sh += '<ul class="sidebar-list">';
      sh += '<li class="sidebar-item' + (activeFilter === null ? ' active' : '') + '" onclick="setFilter(null)">';
      sh += '<span class="sidebar-item-name">All Projects</span>';
      sh += '</li>';
      for (const p of sorted) {
        const taskCount = (groups[p] || []).length;
        const sugKey = p.toLowerCase();
        const pendingSugs = (suggestions[sugKey] || []).filter(s => s.status === 'pending').length;
        const isActive = activeFilter === p;
        sh += '<li class="sidebar-item' + (isActive ? ' active' : '') + '" onclick="setFilter(\'' + esc(p) + '\')">';
        sh += '<span class="sidebar-item-name">' + esc(p) + '</span>';
        sh += '<span class="sidebar-count">' + taskCount + '</span>';
        if (pendingSugs > 0) {
          sh += '<span class="sidebar-badge">' + pendingSugs + '</span>';
        }
        sh += '</li>';
      }
      sh += '</ul>';
      document.getElementById('sidebar').innerHTML = sh;

      // Mobile top bar
      let mh = '';
      mh += '<div class="mobile-topbar-item' + (activeFilter === null ? ' active' : '') + '" onclick="setFilter(null)">All</div>';
      for (const p of sorted) {
        const sugKey = p.toLowerCase();
        const pendingSugs = (suggestions[sugKey] || []).filter(s => s.status === 'pending').length;
        const isActive = activeFilter === p;
        mh += '<div class="mobile-topbar-item' + (isActive ? ' active' : '') + '" onclick="setFilter(\'' + esc(p) + '\')">';
        mh += esc(p);
        if (pendingSugs > 0) mh += ' <span class="sidebar-badge">' + pendingSugs + '</span>';
        mh += '</div>';
      }
      document.getElementById('mobile-topbar').innerHTML = mh;
    }

    function renderCard(t, sessions) {
      const enc = encodeURIComponent(t.task);
      const hasApp = !!t.screenshot;
      const hasFigma = !!t.figmaScreenshot;
      const hasScreenshots = hasApp || hasFigma;

      const wf = 'wf-' + t.task;
      const dev = 'dev-' + t.task;
      const live = sessions.includes(wf) ? wf : sessions.includes(dev) ? dev : null;

      let h = '<div class="card">';

      // Header row
      h += '<div class="card-header">';
      h += '<span class="task-name">' + esc(t.task) + '</span>';
      if (t.branch) h += '<span class="branch">' + esc(t.branch) + '</span>';
      h += statusBadge(t.status);
      h += httpBadge(t.devPort, t.devServerStatus);
      if (t.url) h += '<a class="url-link" href="' + esc(t.url) + '" target="_blank">' + esc(t.url) + '</a>';
      h += '</div>';

      // Card body
      h += '<div class="card-body">';

      // Summary
      if (t.summary) {
        h += '<div class="summary-text">' + esc(t.summary) + '</div>';
      }

      // Original Task
      if (t.originalTask) {
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="section-title">Original Task</div>';
        h += '<div class="section-content">' + esc(t.originalTask) + '</div>';
        h += '</div>';
      }

      // How to Test
      if (t.howToTest && t.howToTest.length) {
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="section-title">How to Test</div>';
        h += '<ul class="checklist">';
        for (const item of t.howToTest) h += '<li>' + esc(item) + '</li>';
        h += '</ul>';
        h += '</div>';
      }

      // Agent Log - collapsed by default
      if (t.agentLog) {
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="collapsible-header" onclick="toggleCollapsible(this)">';
        h += '<span class="toggle-icon">\u25B6</span>';
        h += '<div class="section-title">Agent Log</div>';
        h += '</div>';
        h += '<div class="collapsible-body">';
        h += '<div class="agent-log">' + esc(t.agentLog) + '</div>';
        h += '</div>';
        h += '</div>';
      }

      // Live Output - collapsed by default, only if tmux session active
      if (live) {
        const tid = 'tmux-' + t.task;
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="collapsible-header" onclick="toggleCollapsible(this)">';
        h += '<span class="toggle-icon">\u25B6</span>';
        h += '<div class="section-title">Live Output</div>';
        h += '<div class="live-dot"></div>';
        h += '</div>';
        h += '<div class="collapsible-body">';
        h += '<div class="tmux-section">';
        h += '<div class="tmux-header"><div class="live-dot"></div> ' + esc(live) + '</div>';
        h += '<div class="tmux-output" id="' + tid + '">Connecting...</div>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
      }

      // Screenshots row
      if (hasScreenshots) {
        h += '<hr class="section-divider">';
        h += '<div class="screenshots-row">';
        if (hasApp) {
          h += '<div class="screenshot-wrap">';
          h += '<span class="screenshot-badge screenshot-badge-app">App</span>';
          h += '<div class="screenshot-thumb" onclick="showScreenshot(\'/screenshots/' + enc + '\')">';
          h += '<img src="/screenshots/' + enc + '" alt="Screenshot" loading="lazy">';
          h += '</div></div>';
        }
        if (hasFigma) {
          h += '<div class="screenshot-wrap">';
          h += '<span class="screenshot-badge screenshot-badge-figma">Figma</span>';
          h += '<div class="screenshot-thumb" onclick="showScreenshot(\'/figma-screenshots/' + enc + '\')">';
          h += '<img src="/figma-screenshots/' + enc + '" alt="Figma" loading="lazy">';
          h += '</div></div>';
        }
        h += '</div>';
      }

      h += '</div>'; // end card-body

      // Timestamp footer
      if (t.completedAt) {
        h += '<div class="card-footer">';
        h += '<div class="timestamp">Completed ' + new Date(t.completedAt).toLocaleString() + '</div>';
        h += '</div>';
      }

      h += '</div>'; // end card
      return { html: h, live: live, task: t.task };
    }

    function connectTmux(session, task) {
      if (activeTmux[session]) return;
      const elId = 'tmux-' + task;
      const es = new EventSource('/api/tmux/' + encodeURIComponent(session));
      activeTmux[session] = es;

      es.onmessage = function(e) {
        try {
          const d = JSON.parse(e.data);
          const el = document.getElementById(elId);
          if (!el) { es.close(); delete activeTmux[session]; return; }
          if (d.done) {
            el.closest('.tmux-section').innerHTML = '<div class="tmux-ended">Session ended</div>';
            es.close(); delete activeTmux[session]; return;
          }
          if (d.output !== undefined) {
            el.textContent = d.output;
            el.scrollTop = el.scrollHeight;
          }
        } catch {}
      };

      es.onerror = function() {
        es.close(); delete activeTmux[session];
        const el = document.getElementById(elId);
        if (el) el.closest('.tmux-section').innerHTML = '<div class="tmux-ended">Connection lost</div>';
      };
    }

    function closeAllTmux() {
      for (const k of Object.keys(activeTmux)) {
        activeTmux[k].close();
        delete activeTmux[k];
      }
    }

    async function refresh() {
      try {
        const [tr, sr, sugr] = await Promise.all([
          fetch('/api/tasks'),
          fetch('/api/tmux-sessions'),
          fetch('/api/suggestions')
        ]);
        const tasks = tr.ok ? await tr.json() : [];
        const sessions = sr.ok ? await sr.json() : [];
        const suggestions = sugr.ok ? await sugr.json() : {};
        const dash = document.getElementById('dashboard');

        // Group tasks by project
        const groups = {};
        for (const t of tasks) {
          const p = deriveProject(t.task);
          (groups[p] = groups[p] || []).push(t);
        }

        // Merge suggestion-only projects into groups (empty task arrays)
        for (const key of Object.keys(suggestions)) {
          const upper = key.toUpperCase();
          if (!groups[upper]) groups[upper] = [];
        }

        // Render sidebar
        renderSidebar(groups, suggestions);

        // Filter projects if a filter is active
        const projectKeys = Object.keys(groups).sort();
        const visibleProjects = activeFilter ? projectKeys.filter(p => p === activeFilter) : projectKeys;

        if (!visibleProjects.length && !tasks.length) {
          closeAllTmux();
          dash.innerHTML = '<div class="empty">No tasks found in ~/Tasks</div>';
          return;
        }

        const needed = new Set();
        const results = [];
        let html = '';

        for (const project of visibleProjects) {
          const projectTasks = groups[project] || [];
          html += '<div class="project-group" id="project-' + esc(project) + '">';
          html += '<div class="project-header">' + esc(project) + '</div>';
          const projKey = project.toLowerCase();
          const projSuggestions = suggestions[projKey] || [];
          html += renderSuggestions(projKey, projSuggestions);
          if (projectTasks.length) {
            html += '<div class="task-list">';
            for (const t of projectTasks) {
              const r = renderCard(t, sessions);
              html += r.html;
              results.push(r);
              if (r.live) needed.add(r.live);
            }
            html += '</div>';
          }
          html += '</div>';
        }

        if (!html) {
          html = '<div class="empty">No projects match the filter</div>';
        }

        for (const k of Object.keys(activeTmux)) {
          if (!needed.has(k)) { activeTmux[k].close(); delete activeTmux[k]; }
        }

        dash.innerHTML = html;

        for (const r of results) {
          if (r.live) connectTmux(r.live, r.task);
        }
      } catch (err) {
        console.error('Refresh failed:', err);
      }
    }

    refresh();
    refreshTimer = setInterval(refresh, 5000);
  </script>
</body>
