<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: #f8f8f8;
      color: #111;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 28px 48px 20px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: #c92128;
      letter-spacing: -0.3px;
    }

    .refresh-info {
      font-size: 11px;
      color: #aaa;
    }

    .dashboard {
      padding: 28px 48px 64px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* Project groups */
    .project-group { margin-bottom: 36px; }

    .project-header {
      font-size: 11px;
      font-weight: 700;
      color: #c92128;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 2px solid #eee;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Card row */
    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: #d0d0d0;
      box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    }

    /* Left: screenshots */
    .card-left {
      width: 280px;
      min-width: 280px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-right: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .screenshot-wrap {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .screenshot-badge {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 1px 7px;
      border-radius: 3px;
      width: fit-content;
    }

    .screenshot-badge-app { background: #eef2ff; color: #4f46e5; }
    .screenshot-badge-figma { background: #fdf2f8; color: #db2777; }

    .screenshot-thumb {
      cursor: pointer;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
      transition: border-color 0.15s;
    }

    .screenshot-thumb:hover { border-color: #bbb; }
    .screenshot-thumb img { width: 100%; display: block; }

    .no-screenshots {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-size: 11px;
    }

    /* Middle: content */
    .card-middle {
      flex: 1;
      min-width: 0;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
      flex-wrap: wrap;
    }

    .task-name {
      font-size: 13px;
      font-weight: 600;
      color: #111;
    }

    .branch {
      font-size: 11px;
      color: #aaa;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 10px;
      padding: 2px 9px;
      border-radius: 99px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .badge-done { background: #ecfdf5; color: #059669; }
    .badge-running { background: #fffbeb; color: #d97706; }
    .badge-failed { background: #fef2f2; color: #dc2626; }
    .badge-pending { background: #f4f4f5; color: #71717a; }
    .badge-http-ok { background: #ecfdf5; color: #059669; }
    .badge-http-err { background: #fef2f2; color: #dc2626; }
    .badge-http-off { background: #f4f4f5; color: #a1a1aa; }

    .url-link {
      color: #c92128;
      text-decoration: none;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .url-link:hover { text-decoration: underline; }

    .summary-text {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      line-height: 1.4;
      white-space: pre-line;
    }

    .original-task {
      font-size: 13px;
      color: #777;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      color: #aaa;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-top: 2px;
    }

    .checklist {
      list-style: none;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .checklist li {
      color: #555;
      padding-left: 12px;
      position: relative;
      line-height: 1.5;
    }

    .checklist li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 7px;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #ccc;
    }

    /* Right: log + tmux */
    .card-right {
      width: 340px;
      min-width: 340px;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      border-left: 1px solid #f0f0f0;
      background: #fafafa;
    }

    .agent-log {
      background: #f3f3f3;
      border: 1px solid #e5e5e5;
      border-radius: 5px;
      padding: 8px 10px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 10px;
      color: #555;
      line-height: 1.55;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre;
      flex: 1;
    }

    .agent-log::-webkit-scrollbar { width: 4px; }
    .agent-log::-webkit-scrollbar-track { background: transparent; }
    .agent-log::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .tmux-section {
      border: 1px solid #e5e5e5;
      border-radius: 5px;
      overflow: hidden;
    }

    .tmux-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 10px;
      background: #f7f7f7;
      border-bottom: 1px solid #e5e5e5;
      font-size: 10px;
      color: #666;
      font-weight: 500;
    }

    .live-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tmux-output {
      background: #f3f3f3;
      padding: 6px 10px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 10px;
      color: #555;
      line-height: 1.5;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre;
    }

    .tmux-ended {
      padding: 5px 10px;
      font-size: 10px;
      color: #aaa;
      text-align: center;
      background: #f7f7f7;
    }

    .timestamp {
      font-size: 10px;
      color: #bbb;
      margin-top: auto;
    }

    /* Screenshot overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 100;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .overlay img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #bbb;
      font-size: 14px;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .card { flex-direction: column; }
      .card-left {
        width: 100%;
        min-width: 0;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid #f0f0f0;
      }
      .card-left .screenshot-wrap { flex: 1; }
      .card-right {
        width: 100%;
        min-width: 0;
        border-left: none;
        border-top: 1px solid #f0f0f0;
      }
      .agent-log { max-height: 200px; }
    }

    @media (max-width: 640px) {
      header { padding: 16px; }
      .dashboard { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tasks Dashboard</h1>
    <div class="refresh-info">Auto-refresh 5s</div>
  </header>
  <div class="dashboard" id="dashboard"></div>
  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <img id="overlay-img" src="" alt="">
  </div>

  <script>
    const activeTmux = {};

    function esc(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }

    function statusBadge(status) {
      const s = (status || 'pending').toLowerCase();
      const map = { done: 'Done', running: 'Running', failed: 'Failed', pending: 'Pending' };
      return '<span class="badge badge-' + s + '">' + (map[s] || s) + '</span>';
    }

    function httpBadge(port, status) {
      if (!port) return '<span class="badge badge-http-off">No port</span>';
      if (status && status >= 200 && status < 400)
        return '<span class="badge badge-http-ok">' + status + '</span>';
      if (status)
        return '<span class="badge badge-http-err">' + status + '</span>';
      return '<span class="badge badge-http-off">Offline</span>';
    }

    function deriveProject(name) {
      const i = name.indexOf('-');
      return i > 0 ? name.substring(0, i).toUpperCase() : 'OTHER';
    }

    function showScreenshot(src) {
      document.getElementById('overlay-img').src = src;
      document.getElementById('overlay').classList.add('active');
    }

    function renderCard(t, sessions) {
      const enc = encodeURIComponent(t.task);
      const hasApp = !!t.screenshot;
      const hasFigma = !!t.figmaScreenshot;
      const hasAny = hasApp || hasFigma;

      const wf = 'wf-' + t.task;
      const dev = 'dev-' + t.task;
      const live = sessions.includes(wf) ? wf : sessions.includes(dev) ? dev : null;

      let h = '<div class="card">';

      // Left
      h += '<div class="card-left">';
      if (hasApp) {
        h += '<div class="screenshot-wrap">';
        if (hasFigma) h += '<span class="screenshot-badge screenshot-badge-app">App</span>';
        h += '<div class="screenshot-thumb" onclick="showScreenshot(\'/screenshots/' + enc + '\')">';
        h += '<img src="/screenshots/' + enc + '" alt="Screenshot" loading="lazy">';
        h += '</div></div>';
      }
      if (hasFigma) {
        h += '<div class="screenshot-wrap">';
        h += '<span class="screenshot-badge screenshot-badge-figma">Figma</span>';
        h += '<div class="screenshot-thumb" onclick="showScreenshot(\'/figma-screenshots/' + enc + '\')">';
        h += '<img src="/figma-screenshots/' + enc + '" alt="Figma" loading="lazy">';
        h += '</div></div>';
      }
      if (!hasAny) h += '<div class="no-screenshots">No screenshots</div>';
      h += '</div>';

      // Middle
      h += '<div class="card-middle">';
      h += '<div class="title-row">';
      h += '<span class="task-name">' + esc(t.task) + '</span>';
      if (t.branch) h += '<span class="branch">' + esc(t.branch) + '</span>';
      h += '</div>';

      h += '<div class="meta-row">';
      h += statusBadge(t.status);
      h += httpBadge(t.devPort, t.devServerStatus);
      if (t.url) h += '<a class="url-link" href="' + esc(t.url) + '" target="_blank">' + esc(t.url) + '</a>';
      h += '</div>';

      if (t.summary) h += '<div class="summary-text">' + esc(t.summary) + '</div>';
      if (t.originalTask) h += '<div class="original-task">' + esc(t.originalTask) + '</div>';

      if (t.howToTest && t.howToTest.length) {
        h += '<div class="section-label">How to test</div><ul class="checklist">';
        for (const item of t.howToTest) h += '<li>' + esc(item) + '</li>';
        h += '</ul>';
      }
      h += '</div>';

      // Right
      h += '<div class="card-right">';
      if (t.agentLog) {
        h += '<div class="section-label">Agent Log</div>';
        h += '<div class="agent-log">' + esc(t.agentLog) + '</div>';
      }

      if (live) {
        const tid = 'tmux-' + t.task;
        h += '<div class="tmux-section">';
        h += '<div class="tmux-header"><div class="live-dot"></div> Live &mdash; ' + esc(live) + '</div>';
        h += '<div class="tmux-output" id="' + tid + '">Connecting...</div>';
        h += '</div>';
      }

      if (t.completedAt) {
        h += '<div class="timestamp">Completed ' + new Date(t.completedAt).toLocaleString() + '</div>';
      }

      h += '</div></div>';
      return { html: h, live: live, task: t.task };
    }

    function connectTmux(session, task) {
      if (activeTmux[session]) return;
      const elId = 'tmux-' + task;
      const es = new EventSource('/api/tmux/' + encodeURIComponent(session));
      activeTmux[session] = es;

      es.onmessage = function(e) {
        try {
          const d = JSON.parse(e.data);
          const el = document.getElementById(elId);
          if (!el) { es.close(); delete activeTmux[session]; return; }
          if (d.done) {
            el.closest('.tmux-section').innerHTML = '<div class="tmux-ended">Session ended</div>';
            es.close(); delete activeTmux[session]; return;
          }
          if (d.output !== undefined) {
            el.textContent = d.output;
            el.scrollTop = el.scrollHeight;
          }
        } catch {}
      };

      es.onerror = function() {
        es.close(); delete activeTmux[session];
        const el = document.getElementById(elId);
        if (el) el.closest('.tmux-section').innerHTML = '<div class="tmux-ended">Connection lost</div>';
      };
    }

    function closeAllTmux() {
      for (const k of Object.keys(activeTmux)) {
        activeTmux[k].close();
        delete activeTmux[k];
      }
    }

    async function refresh() {
      try {
        const [tr, sr] = await Promise.all([
          fetch('/api/tasks'),
          fetch('/api/tmux-sessions')
        ]);
        const tasks = await tr.json();
        const sessions = await sr.json();
        const dash = document.getElementById('dashboard');

        if (!tasks.length) {
          closeAllTmux();
          dash.innerHTML = '<div class="empty">No tasks found in ~/Tasks</div>';
          return;
        }

        const groups = {};
        for (const t of tasks) {
          const p = deriveProject(t.task);
          (groups[p] = groups[p] || []).push(t);
        }

        const needed = new Set();
        const results = [];
        let html = '';

        for (const project of Object.keys(groups).sort()) {
          html += '<div class="project-group">';
          html += '<div class="project-header">' + esc(project) + '</div>';
          html += '<div class="task-list">';
          for (const t of groups[project]) {
            const r = renderCard(t, sessions);
            html += r.html;
            results.push(r);
            if (r.live) needed.add(r.live);
          }
          html += '</div></div>';
        }

        for (const k of Object.keys(activeTmux)) {
          if (!needed.has(k)) { activeTmux[k].close(); delete activeTmux[k]; }
        }

        dash.innerHTML = html;

        for (const r of results) {
          if (r.live) connectTmux(r.live, r.task);
        }
      } catch (err) {
        console.error('Refresh failed:', err);
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
