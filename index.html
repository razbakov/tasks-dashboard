<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks Dashboard</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #111;
      min-height: 100vh;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 24px 24px 20px;
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 16px;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #c92128;
      letter-spacing: -0.3px;
    }

    .refresh-info {
      font-size: 14px;
      color: #999;
    }

    .dashboard {
      padding: 32px 16px 64px;
      max-width: 660px;
      margin: 0 auto;
    }

    /* Project groups */
    .project-group { margin-bottom: 32px; }

    .project-header {
      font-size: 14px;
      font-weight: 700;
      color: #c92128;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e5e5e5;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Card - vertical stack */
    .card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      border-color: #ccc;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    /* Header row */
    .card-header {
      padding: 20px 24px 16px;
      display: flex;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
    }

    .task-name {
      font-size: 20px;
      font-weight: 700;
      color: #111;
    }

    .branch {
      font-size: 14px;
      color: #999;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .badge {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 99px;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .badge-done { background: #ecfdf5; color: #059669; }
    .badge-running { background: #fffbeb; color: #d97706; }
    .badge-failed { background: #fef2f2; color: #dc2626; }
    .badge-pending { background: #f4f4f5; color: #71717a; }
    .badge-http-ok { background: #ecfdf5; color: #059669; }
    .badge-http-err { background: #fef2f2; color: #dc2626; }
    .badge-http-off { background: #f4f4f5; color: #a1a1aa; }

    .url-link {
      color: #c92128;
      text-decoration: none;
      font-size: 14px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .url-link:hover { text-decoration: underline; }

    /* Card body sections */
    .card-body {
      padding: 0 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .summary-text {
      font-size: 16px;
      font-weight: 500;
      color: #222;
      line-height: 1.5;
    }

    .section-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 0;
    }

    .section-title {
      font-size: 18px;
      font-weight: 700;
      color: #c92128;
      margin-bottom: 6px;
    }

    .section-content {
      font-size: 15px;
      color: #444;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .checklist {
      list-style: none;
      font-size: 15px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .checklist li {
      color: #444;
      padding-left: 18px;
      position: relative;
      line-height: 1.5;
    }

    .checklist li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 9px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #c92128;
    }

    /* Collapsible sections */
    .collapsible-header {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .collapsible-header .section-title {
      margin-bottom: 0;
    }

    .toggle-icon {
      font-size: 14px;
      color: #999;
      width: 16px;
      transition: transform 0.15s;
    }

    .collapsible-body {
      display: none;
      margin-top: 8px;
    }

    .collapsible-body.open {
      display: block;
    }

    .agent-log {
      background: #f7f7f7;
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      padding: 12px 14px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 13px;
      color: #555;
      line-height: 1.6;
      max-height: 400px;
      overflow-y: auto;
      white-space: pre;
    }

    .agent-log::-webkit-scrollbar { width: 5px; }
    .agent-log::-webkit-scrollbar-track { background: transparent; }
    .agent-log::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    /* Tmux / Live Output */
    .tmux-section {
      border: 1px solid #e5e5e5;
      border-radius: 6px;
      overflow: hidden;
    }

    .tmux-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #f7f7f7;
      border-bottom: 1px solid #e5e5e5;
      font-size: 13px;
      color: #666;
      font-weight: 500;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tmux-output {
      background: #f7f7f7;
      padding: 10px 14px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 13px;
      color: #555;
      line-height: 1.5;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre;
    }

    .tmux-ended {
      padding: 8px 14px;
      font-size: 14px;
      color: #aaa;
      text-align: center;
      background: #f7f7f7;
    }

    /* Screenshots row */
    .screenshots-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .screenshot-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
      max-width: 50%;
    }

    .screenshot-badge {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 4px;
      width: fit-content;
    }

    .screenshot-badge-app { background: #eef2ff; color: #4f46e5; }
    .screenshot-badge-figma { background: #fdf2f8; color: #db2777; }

    .screenshot-thumb {
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e5e5e5;
      transition: border-color 0.15s;
    }

    .screenshot-thumb:hover { border-color: #bbb; }
    .screenshot-thumb img { width: 100%; display: block; }

    /* Timestamp */
    .card-footer {
      padding: 0 24px 16px;
      display: flex;
      justify-content: flex-end;
    }

    .timestamp {
      font-size: 14px;
      color: #aaa;
    }

    /* Screenshot overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 100;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .overlay img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #999;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Tasks Dashboard</h1>
    <div class="refresh-info">Auto-refresh 5s</div>
  </header>
  <div class="dashboard" id="dashboard"></div>
  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <img id="overlay-img" src="" alt="">
  </div>

  <script>
    const activeTmux = {};

    function esc(str) {
      const el = document.createElement('div');
      el.textContent = str;
      return el.innerHTML;
    }

    function statusBadge(status) {
      const s = (status || 'pending').toLowerCase();
      const map = { done: 'Done', running: 'Running', failed: 'Failed', pending: 'Pending' };
      return '<span class="badge badge-' + s + '">' + (map[s] || s) + '</span>';
    }

    function httpBadge(port, status) {
      if (!port) return '<span class="badge badge-http-off">No port</span>';
      if (status && status >= 200 && status < 400)
        return '<span class="badge badge-http-ok">' + status + '</span>';
      if (status)
        return '<span class="badge badge-http-err">' + status + '</span>';
      return '<span class="badge badge-http-off">Offline</span>';
    }

    function deriveProject(name) {
      const i = name.indexOf('-');
      return i > 0 ? name.substring(0, i).toUpperCase() : 'OTHER';
    }

    function showScreenshot(src) {
      document.getElementById('overlay-img').src = src;
      document.getElementById('overlay').classList.add('active');
    }

    function toggleCollapsible(btn) {
      const body = btn.nextElementSibling;
      const icon = btn.querySelector('.toggle-icon');
      const isOpen = body.classList.toggle('open');
      icon.textContent = isOpen ? '\u25BC' : '\u25B6';
    }

    function renderCard(t, sessions) {
      const enc = encodeURIComponent(t.task);
      const hasApp = !!t.screenshot;
      const hasFigma = !!t.figmaScreenshot;
      const hasScreenshots = hasApp || hasFigma;

      const wf = 'wf-' + t.task;
      const dev = 'dev-' + t.task;
      const live = sessions.includes(wf) ? wf : sessions.includes(dev) ? dev : null;

      let h = '<div class="card">';

      // Header row
      h += '<div class="card-header">';
      h += '<span class="task-name">' + esc(t.task) + '</span>';
      if (t.branch) h += '<span class="branch">' + esc(t.branch) + '</span>';
      h += statusBadge(t.status);
      h += httpBadge(t.devPort, t.devServerStatus);
      if (t.url) h += '<a class="url-link" href="' + esc(t.url) + '" target="_blank">' + esc(t.url) + '</a>';
      h += '</div>';

      // Card body
      h += '<div class="card-body">';

      // Summary
      if (t.summary) {
        h += '<div class="summary-text">' + esc(t.summary) + '</div>';
      }

      // Original Task
      if (t.originalTask) {
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="section-title">Original Task</div>';
        h += '<div class="section-content">' + esc(t.originalTask) + '</div>';
        h += '</div>';
      }

      // How to Test
      if (t.howToTest && t.howToTest.length) {
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="section-title">How to Test</div>';
        h += '<ul class="checklist">';
        for (const item of t.howToTest) h += '<li>' + esc(item) + '</li>';
        h += '</ul>';
        h += '</div>';
      }

      // Agent Log - collapsed by default
      if (t.agentLog) {
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="collapsible-header" onclick="toggleCollapsible(this)">';
        h += '<span class="toggle-icon">\u25B6</span>';
        h += '<div class="section-title">Agent Log</div>';
        h += '</div>';
        h += '<div class="collapsible-body">';
        h += '<div class="agent-log">' + esc(t.agentLog) + '</div>';
        h += '</div>';
        h += '</div>';
      }

      // Live Output - collapsed by default, only if tmux session active
      if (live) {
        const tid = 'tmux-' + t.task;
        h += '<hr class="section-divider">';
        h += '<div>';
        h += '<div class="collapsible-header" onclick="toggleCollapsible(this)">';
        h += '<span class="toggle-icon">\u25B6</span>';
        h += '<div class="section-title">Live Output</div>';
        h += '<div class="live-dot"></div>';
        h += '</div>';
        h += '<div class="collapsible-body">';
        h += '<div class="tmux-section">';
        h += '<div class="tmux-header"><div class="live-dot"></div> ' + esc(live) + '</div>';
        h += '<div class="tmux-output" id="' + tid + '">Connecting...</div>';
        h += '</div>';
        h += '</div>';
        h += '</div>';
      }

      // Screenshots row
      if (hasScreenshots) {
        h += '<hr class="section-divider">';
        h += '<div class="screenshots-row">';
        if (hasApp) {
          h += '<div class="screenshot-wrap">';
          h += '<span class="screenshot-badge screenshot-badge-app">App</span>';
          h += '<div class="screenshot-thumb" onclick="showScreenshot(\'/screenshots/' + enc + '\')">';
          h += '<img src="/screenshots/' + enc + '" alt="Screenshot" loading="lazy">';
          h += '</div></div>';
        }
        if (hasFigma) {
          h += '<div class="screenshot-wrap">';
          h += '<span class="screenshot-badge screenshot-badge-figma">Figma</span>';
          h += '<div class="screenshot-thumb" onclick="showScreenshot(\'/figma-screenshots/' + enc + '\')">';
          h += '<img src="/figma-screenshots/' + enc + '" alt="Figma" loading="lazy">';
          h += '</div></div>';
        }
        h += '</div>';
      }

      h += '</div>'; // end card-body

      // Timestamp footer
      if (t.completedAt) {
        h += '<div class="card-footer">';
        h += '<div class="timestamp">Completed ' + new Date(t.completedAt).toLocaleString() + '</div>';
        h += '</div>';
      }

      h += '</div>'; // end card
      return { html: h, live: live, task: t.task };
    }

    function connectTmux(session, task) {
      if (activeTmux[session]) return;
      const elId = 'tmux-' + task;
      const es = new EventSource('/api/tmux/' + encodeURIComponent(session));
      activeTmux[session] = es;

      es.onmessage = function(e) {
        try {
          const d = JSON.parse(e.data);
          const el = document.getElementById(elId);
          if (!el) { es.close(); delete activeTmux[session]; return; }
          if (d.done) {
            el.closest('.tmux-section').innerHTML = '<div class="tmux-ended">Session ended</div>';
            es.close(); delete activeTmux[session]; return;
          }
          if (d.output !== undefined) {
            el.textContent = d.output;
            el.scrollTop = el.scrollHeight;
          }
        } catch {}
      };

      es.onerror = function() {
        es.close(); delete activeTmux[session];
        const el = document.getElementById(elId);
        if (el) el.closest('.tmux-section').innerHTML = '<div class="tmux-ended">Connection lost</div>';
      };
    }

    function closeAllTmux() {
      for (const k of Object.keys(activeTmux)) {
        activeTmux[k].close();
        delete activeTmux[k];
      }
    }

    async function refresh() {
      try {
        const [tr, sr] = await Promise.all([
          fetch('/api/tasks'),
          fetch('/api/tmux-sessions')
        ]);
        const tasks = tr.ok ? await tr.json() : [];
        const sessions = sr.ok ? await sr.json() : [];
        const dash = document.getElementById('dashboard');

        if (!tasks.length) {
          closeAllTmux();
          dash.innerHTML = '<div class="empty">No tasks found in ~/Tasks</div>';
          return;
        }

        const groups = {};
        for (const t of tasks) {
          const p = deriveProject(t.task);
          (groups[p] = groups[p] || []).push(t);
        }

        const needed = new Set();
        const results = [];
        let html = '';

        for (const project of Object.keys(groups).sort()) {
          html += '<div class="project-group">';
          html += '<div class="project-header">' + esc(project) + '</div>';
          html += '<div class="task-list">';
          for (const t of groups[project]) {
            const r = renderCard(t, sessions);
            html += r.html;
            results.push(r);
            if (r.live) needed.add(r.live);
          }
          html += '</div></div>';
        }

        for (const k of Object.keys(activeTmux)) {
          if (!needed.has(k)) { activeTmux[k].close(); delete activeTmux[k]; }
        }

        dash.innerHTML = html;

        for (const r of results) {
          if (r.live) connectTmux(r.live, r.task);
        }
      } catch (err) {
        console.error('Refresh failed:', err);
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
