<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: #111113;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      padding: 32px 40px 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #1e1e21;
    }

    header h1 {
      font-size: 18px;
      font-weight: 500;
      color: #f0f0f0;
      letter-spacing: -0.3px;
    }

    .refresh-info {
      font-size: 12px;
      color: #555;
      font-weight: 400;
    }

    .dashboard {
      padding: 24px 40px 60px;
    }

    .project-group {
      margin-bottom: 40px;
    }

    .project-header {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e21;
    }

    .project-row {
      display: flex;
      gap: 16px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: #2a2a2e #111113;
    }

    .project-row::-webkit-scrollbar {
      height: 6px;
    }

    .project-row::-webkit-scrollbar-track {
      background: transparent;
    }

    .project-row::-webkit-scrollbar-thumb {
      background: #2a2a2e;
      border-radius: 3px;
    }

    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 10px;
      padding: 20px;
      min-width: 380px;
      max-width: 420px;
      flex-shrink: 0;
      transition: border-color 0.15s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      border-color: #3f3f46;
    }

    .card-top {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .task-name {
      font-size: 13px;
      font-weight: 500;
      color: #a1a1aa;
    }

    .branch {
      font-size: 11px;
      color: #52525b;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .badge-done { background: #052e16; color: #4ade80; }
    .badge-running { background: #422006; color: #fbbf24; }
    .badge-failed { background: #450a0a; color: #f87171; }
    .badge-pending { background: #1e1b4b; color: #a5b4fc; }
    .badge-server-up { background: #052e16; color: #4ade80; }
    .badge-server-down { background: #450a0a; color: #f87171; }
    .badge-server-off { background: #1c1c1e; color: #3f3f46; }

    .url-link {
      color: #a78bfa;
      text-decoration: none;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
      transition: color 0.15s;
    }

    .url-link:hover {
      color: #c4b5fd;
      text-decoration: underline;
    }

    .screenshot-thumb {
      cursor: pointer;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #27272a;
      transition: border-color 0.15s;
    }

    .screenshot-thumb:hover {
      border-color: #3f3f46;
    }

    .screenshot-thumb img {
      width: 100%;
      display: block;
    }

    .summary {
      font-size: 14px;
      font-weight: 600;
      color: #f4f4f5;
      line-height: 1.5;
      white-space: pre-line;
    }

    .original-task {
      font-size: 13px;
      color: #71717a;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #52525b;
      letter-spacing: 0.5px;
      font-weight: 500;
    }

    .checklist {
      list-style: none;
      padding: 0;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .checklist li {
      color: #a1a1aa;
      padding-left: 14px;
      position: relative;
      line-height: 1.5;
    }

    .checklist li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #52525b;
    }

    .agent-log {
      background: #0c0c0e;
      border: 1px solid #1e1e21;
      border-radius: 8px;
      padding: 12px;
      font-family: 'SF Mono', 'Fira Code', 'Fira Mono', Menlo, monospace;
      font-size: 11px;
      color: #71717a;
      line-height: 1.7;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
      scrollbar-width: thin;
      scrollbar-color: #27272a #0c0c0e;
    }

    .agent-log::-webkit-scrollbar {
      width: 5px;
    }

    .agent-log::-webkit-scrollbar-track {
      background: transparent;
    }

    .agent-log::-webkit-scrollbar-thumb {
      background: #27272a;
      border-radius: 3px;
    }

    .timestamp {
      font-size: 11px;
      color: #3f3f46;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      z-index: 100;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .overlay img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
    }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #3f3f46;
      font-size: 15px;
    }

    @media (max-width: 480px) {
      header { padding: 20px 16px 16px; }
      .dashboard { padding: 16px; }
      .card { min-width: 320px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tasks Dashboard</h1>
    <div class="refresh-info">Auto-refresh 5s</div>
  </header>
  <div class="dashboard" id="dashboard"></div>
  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <img id="overlay-img" src="" alt="Screenshot">
  </div>

  <script>
    function statusBadge(status) {
      const s = (status || 'pending').toLowerCase();
      const labels = { done: 'Done', running: 'Running', failed: 'Failed', pending: 'Pending' };
      return `<span class="badge badge-${s}">${labels[s] || s}</span>`;
    }

    function serverBadge(devPort, devServerStatus) {
      if (!devPort) return `<span class="badge badge-server-off">No port</span>`;
      if (devServerStatus && devServerStatus >= 200 && devServerStatus < 400)
        return `<span class="badge badge-server-up">${devServerStatus}</span>`;
      if (devServerStatus)
        return `<span class="badge badge-server-down">${devServerStatus}</span>`;
      return `<span class="badge badge-server-down">Offline</span>`;
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function deriveProject(taskName) {
      const parts = taskName.split('-');
      if (parts.length > 1) return parts[0];
      return 'other';
    }

    function renderCard(t) {
      let html = `<div class="card">`;

      // 1. Task name + branch
      html += `<div class="card-top">`;
      html += `<div class="task-name">${escapeHtml(t.task)}</div>`;
      if (t.branch) html += `<div class="branch">${escapeHtml(t.branch)}</div>`;
      html += `</div>`;

      // 2. Status + HTTP badge + URL
      html += `<div class="meta-row">`;
      html += statusBadge(t.status);
      html += serverBadge(t.devPort, t.devServerStatus);
      if (t.url) html += `<a class="url-link" href="${escapeHtml(t.url)}" target="_blank">${escapeHtml(t.url)}</a>`;
      html += `</div>`;

      // 3. Screenshot
      if (t.screenshot) {
        html += `<div class="screenshot-thumb" onclick="showScreenshot('${escapeHtml(t.task)}')">`;
        html += `<img src="/screenshots/${encodeURIComponent(t.task)}" alt="Screenshot" loading="lazy">`;
        html += `</div>`;
      }

      // 4. Summary
      if (t.summary) {
        html += `<div class="summary">${escapeHtml(t.summary)}</div>`;
      }

      // 5. Original task
      if (t.originalTask) {
        html += `<div class="original-task">${escapeHtml(t.originalTask)}</div>`;
      }

      // 6. How to test
      if (t.howToTest && t.howToTest.length) {
        html += `<div class="section-label">How to test</div>`;
        html += `<ul class="checklist">`;
        t.howToTest.forEach(item => { html += `<li>${escapeHtml(item)}</li>`; });
        html += `</ul>`;
      }

      // 7. Agent log (full, scrollable)
      if (t.agentLogTail && t.agentLogTail.length) {
        html += `<div class="section-label">Agent log</div>`;
        html += `<div class="agent-log">${t.agentLogTail.map(l => escapeHtml(l)).join('\n')}</div>`;
      }

      // 8. Timestamp
      if (t.completedAt) {
        const d = new Date(t.completedAt);
        html += `<div class="timestamp">Completed ${d.toLocaleString()}</div>`;
      }

      html += `</div>`;
      return html;
    }

    function showScreenshot(task) {
      const overlay = document.getElementById('overlay');
      const img = document.getElementById('overlay-img');
      img.src = `/screenshots/${encodeURIComponent(task)}`;
      overlay.classList.add('active');
    }

    async function refresh() {
      try {
        const res = await fetch('/api/tasks');
        const tasks = await res.json();
        const dashboard = document.getElementById('dashboard');

        if (tasks.length === 0) {
          dashboard.innerHTML = '<div class="empty">No tasks found</div>';
          return;
        }

        // Group by project
        const groups = {};
        tasks.forEach(t => {
          const project = deriveProject(t.task);
          if (!groups[project]) groups[project] = [];
          groups[project].push(t);
        });

        // Sort projects alphabetically
        const sortedProjects = Object.keys(groups).sort();

        let html = '';
        sortedProjects.forEach(project => {
          html += `<div class="project-group">`;
          html += `<div class="project-header">${escapeHtml(project)}</div>`;
          html += `<div class="project-row">`;
          groups[project].forEach(t => { html += renderCard(t); });
          html += `</div></div>`;
        });

        dashboard.innerHTML = html;
      } catch (err) {
        console.error('Failed to refresh:', err);
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
