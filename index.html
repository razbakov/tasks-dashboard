<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tasks Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
      background: #fafafa;
      color: #1a1a1a;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    header {
      padding: 32px 48px 24px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5e5;
      background: #fff;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #c92128;
      letter-spacing: -0.3px;
    }

    .refresh-info {
      font-size: 12px;
      color: #999;
      font-weight: 400;
    }

    .dashboard {
      padding: 32px 48px 60px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .project-group {
      margin-bottom: 40px;
    }

    .project-header {
      font-size: 12px;
      font-weight: 700;
      color: #c92128;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #f0f0f0;
    }

    .task-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 10px;
      display: flex;
      flex-direction: row;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      overflow: hidden;
    }

    .card:hover {
      border-color: #d0d0d0;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
    }

    /* Left column: screenshots */
    .card-left {
      width: 280px;
      min-width: 280px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-right: 1px solid #f0f0f0;
      background: #fcfcfc;
    }

    .screenshot-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .screenshot-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border-radius: 4px;
      width: fit-content;
    }

    .screenshot-label-app {
      background: #eef2ff;
      color: #4f46e5;
    }

    .screenshot-label-figma {
      background: #fdf2f8;
      color: #db2777;
    }

    .screenshot-thumb {
      cursor: pointer;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid #e8e8e8;
      transition: border-color 0.15s;
    }

    .screenshot-thumb:hover {
      border-color: #c0c0c0;
    }

    .screenshot-thumb img {
      width: 100%;
      display: block;
    }

    .no-screenshots {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: #ccc;
      font-size: 12px;
    }

    /* Middle column: content */
    .card-middle {
      flex: 1;
      min-width: 0;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card-title-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }

    .task-name {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .branch {
      font-size: 11px;
      color: #999;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 11px;
      padding: 2px 10px;
      border-radius: 100px;
      font-weight: 500;
      white-space: nowrap;
      letter-spacing: 0.2px;
    }

    .badge-done { background: #ecfdf5; color: #059669; }
    .badge-running { background: #fffbeb; color: #d97706; }
    .badge-failed { background: #fef2f2; color: #dc2626; }
    .badge-pending { background: #f0f0ff; color: #6366f1; }
    .badge-server-up { background: #ecfdf5; color: #059669; }
    .badge-server-down { background: #fef2f2; color: #dc2626; }
    .badge-server-off { background: #f5f5f5; color: #999; }

    .url-link {
      color: #c92128;
      text-decoration: none;
      font-size: 12px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      transition: color 0.15s;
    }

    .url-link:hover {
      color: #a01b21;
      text-decoration: underline;
    }

    .summary {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      line-height: 1.5;
      white-space: pre-line;
    }

    .original-task {
      font-size: 13px;
      color: #777;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      color: #999;
      letter-spacing: 0.5px;
      font-weight: 600;
      margin-top: 4px;
    }

    .checklist {
      list-style: none;
      padding: 0;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .checklist li {
      color: #555;
      padding-left: 14px;
      position: relative;
      line-height: 1.5;
    }

    .checklist li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 8px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ccc;
    }

    /* Right column: log + tmux */
    .card-right {
      width: 340px;
      min-width: 340px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-left: 1px solid #f0f0f0;
      background: #fcfcfc;
    }

    .agent-log {
      background: #f5f5f5;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 10px 12px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 11px;
      color: #555;
      line-height: 1.6;
      max-height: 300px;
      overflow-y: auto;
      white-space: pre;
      flex: 1;
    }

    .agent-log::-webkit-scrollbar { width: 5px; }
    .agent-log::-webkit-scrollbar-track { background: transparent; }
    .agent-log::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

    .tmux-section {
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      overflow: hidden;
    }

    .tmux-header {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #f9f9f9;
      border-bottom: 1px solid #e8e8e8;
      font-size: 11px;
      color: #666;
      font-weight: 500;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .tmux-output {
      background: #f5f5f5;
      padding: 8px 10px;
      font-family: 'SF Mono', 'Fira Code', Menlo, monospace;
      font-size: 11px;
      color: #555;
      line-height: 1.5;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre;
    }

    .tmux-ended {
      padding: 6px 10px;
      font-size: 11px;
      color: #999;
      text-align: center;
      background: #f9f9f9;
    }

    .timestamp {
      font-size: 11px;
      color: #bbb;
    }

    /* Overlay for screenshots */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      cursor: zoom-out;
      align-items: center;
      justify-content: center;
    }

    .overlay.active { display: flex; }

    .overlay img {
      max-width: 92vw;
      max-height: 92vh;
      border-radius: 10px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }

    .empty {
      text-align: center;
      padding: 80px 24px;
      color: #bbb;
      font-size: 15px;
    }

    @media (max-width: 1200px) {
      .card { flex-direction: column; }
      .card-left {
        width: 100%;
        min-width: 0;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid #f0f0f0;
      }
      .card-left .screenshot-container { flex: 1; }
      .card-right {
        width: 100%;
        min-width: 0;
        border-left: none;
        border-top: 1px solid #f0f0f0;
      }
      .agent-log { max-height: 200px; }
    }

    @media (max-width: 640px) {
      header { padding: 20px 16px 16px; }
      .dashboard { padding: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Tasks Dashboard</h1>
    <div class="refresh-info">Auto-refresh 5s</div>
  </header>
  <div class="dashboard" id="dashboard"></div>
  <div class="overlay" id="overlay" onclick="this.classList.remove('active')">
    <img id="overlay-img" src="" alt="Screenshot">
  </div>

  <script>
    const activeTmuxStreams = {};

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function statusBadge(status) {
      const s = (status || 'pending').toLowerCase();
      const labels = { done: 'Done', running: 'Running', failed: 'Failed', pending: 'Pending' };
      return `<span class="badge badge-${s}">${labels[s] || s}</span>`;
    }

    function serverBadge(devPort, devServerStatus) {
      if (!devPort) return `<span class="badge badge-server-off">No port</span>`;
      if (devServerStatus && devServerStatus >= 200 && devServerStatus < 400)
        return `<span class="badge badge-server-up">${devServerStatus}</span>`;
      if (devServerStatus)
        return `<span class="badge badge-server-down">${devServerStatus}</span>`;
      return `<span class="badge badge-server-down">Offline</span>`;
    }

    function deriveProject(taskName) {
      const parts = taskName.split('-');
      if (parts.length > 1) return parts[0].toUpperCase();
      return 'OTHER';
    }

    function showScreenshot(src) {
      const overlay = document.getElementById('overlay');
      const img = document.getElementById('overlay-img');
      img.src = src;
      overlay.classList.add('active');
    }

    function renderCard(t, tmuxSessions) {
      const taskEnc = encodeURIComponent(t.task);
      const hasScreenshot = !!t.screenshot;
      const hasFigma = !!t.figmaScreenshot;
      const hasAnyScreenshot = hasScreenshot || hasFigma;

      // Determine tmux session
      const wfSession = `wf-${t.task}`;
      const devSession = `dev-${t.task}`;
      const liveSession = tmuxSessions.includes(wfSession) ? wfSession
        : tmuxSessions.includes(devSession) ? devSession
        : null;

      let html = `<div class="card">`;

      // LEFT: screenshots
      html += `<div class="card-left">`;
      if (hasScreenshot) {
        html += `<div class="screenshot-container">`;
        if (hasFigma) html += `<span class="screenshot-label screenshot-label-app">App</span>`;
        html += `<div class="screenshot-thumb" onclick="showScreenshot('/screenshots/${taskEnc}')">`;
        html += `<img src="/screenshots/${taskEnc}" alt="Screenshot" loading="lazy">`;
        html += `</div></div>`;
      }
      if (hasFigma) {
        html += `<div class="screenshot-container">`;
        html += `<span class="screenshot-label screenshot-label-figma">Figma</span>`;
        html += `<div class="screenshot-thumb" onclick="showScreenshot('/figma-screenshots/${taskEnc}')">`;
        html += `<img src="/figma-screenshots/${taskEnc}" alt="Figma" loading="lazy">`;
        html += `</div></div>`;
      }
      if (!hasAnyScreenshot) {
        html += `<div class="no-screenshots">No screenshots</div>`;
      }
      html += `</div>`;

      // MIDDLE: content
      html += `<div class="card-middle">`;

      // Title + branch
      html += `<div class="card-title-row">`;
      html += `<span class="task-name">${escapeHtml(t.task)}</span>`;
      if (t.branch) html += `<span class="branch">${escapeHtml(t.branch)}</span>`;
      html += `</div>`;

      // Status + HTTP + URL
      html += `<div class="meta-row">`;
      html += statusBadge(t.status);
      html += serverBadge(t.devPort, t.devServerStatus);
      if (t.url) html += `<a class="url-link" href="${escapeHtml(t.url)}" target="_blank">${escapeHtml(t.url)}</a>`;
      html += `</div>`;

      // Summary
      if (t.summary) {
        html += `<div class="summary">${escapeHtml(t.summary)}</div>`;
      }

      // Original task
      if (t.originalTask) {
        html += `<div class="original-task">${escapeHtml(t.originalTask)}</div>`;
      }

      // How to test
      if (t.howToTest && t.howToTest.length) {
        html += `<div class="section-label">How to test</div>`;
        html += `<ul class="checklist">`;
        t.howToTest.forEach(item => { html += `<li>${escapeHtml(item)}</li>`; });
        html += `</ul>`;
      }

      html += `</div>`;

      // RIGHT: log + tmux + timestamp
      html += `<div class="card-right">`;

      if (t.agentLog) {
        html += `<div class="section-label">Agent Log</div>`;
        html += `<div class="agent-log">${escapeHtml(t.agentLog)}</div>`;
      }

      if (liveSession) {
        const tmuxId = `tmux-${t.task}`;
        html += `<div class="tmux-section">`;
        html += `<div class="tmux-header"><div class="live-dot"></div> Live &mdash; ${escapeHtml(liveSession)}</div>`;
        html += `<div class="tmux-output" id="${tmuxId}">Connecting...</div>`;
        html += `</div>`;
      }

      if (t.completedAt) {
        const d = new Date(t.completedAt);
        html += `<div class="timestamp">Completed ${d.toLocaleString()}</div>`;
      }

      html += `</div>`;
      html += `</div>`;
      return { html, liveSession, task: t.task };
    }

    function connectTmux(session, taskName) {
      const elId = `tmux-${taskName}`;
      const key = session;

      // Don't reconnect if already connected
      if (activeTmuxStreams[key]) return;

      const es = new EventSource(`/api/tmux/${encodeURIComponent(session)}`);
      activeTmuxStreams[key] = es;

      es.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          const el = document.getElementById(elId);
          if (!el) { es.close(); delete activeTmuxStreams[key]; return; }

          if (data.done) {
            el.closest('.tmux-section').innerHTML =
              `<div class="tmux-ended">Session ended</div>`;
            es.close();
            delete activeTmuxStreams[key];
            return;
          }

          if (data.output !== undefined) {
            el.textContent = data.output;
            el.scrollTop = el.scrollHeight;
          }
        } catch {}
      };

      es.onerror = () => {
        es.close();
        delete activeTmuxStreams[key];
        const el = document.getElementById(elId);
        if (el) {
          el.closest('.tmux-section').innerHTML =
            `<div class="tmux-ended">Connection lost</div>`;
        }
      };
    }

    function closeAllTmuxStreams() {
      for (const key of Object.keys(activeTmuxStreams)) {
        activeTmuxStreams[key].close();
        delete activeTmuxStreams[key];
      }
    }

    async function refresh() {
      try {
        const [tasksRes, sessionsRes] = await Promise.all([
          fetch('/api/tasks'),
          fetch('/api/tmux-sessions')
        ]);
        const tasks = await tasksRes.json();
        const tmuxSessions = await sessionsRes.json();
        const dashboard = document.getElementById('dashboard');

        if (tasks.length === 0) {
          closeAllTmuxStreams();
          dashboard.innerHTML = '<div class="empty">No tasks found in ~/Tasks</div>';
          return;
        }

        // Group by project
        const groups = {};
        tasks.forEach(t => {
          const project = deriveProject(t.task);
          if (!groups[project]) groups[project] = [];
          groups[project].push(t);
        });

        const sortedProjects = Object.keys(groups).sort();

        // Track which tmux sessions we need
        const neededSessions = new Set();
        const cardResults = [];

        let html = '';
        sortedProjects.forEach(project => {
          html += `<div class="project-group">`;
          html += `<div class="project-header">${escapeHtml(project)}</div>`;
          html += `<div class="task-list">`;
          groups[project].forEach(t => {
            const result = renderCard(t, tmuxSessions);
            html += result.html;
            cardResults.push(result);
            if (result.liveSession) neededSessions.add(result.liveSession);
          });
          html += `</div></div>`;
        });

        // Close streams for sessions that are no longer needed
        for (const key of Object.keys(activeTmuxStreams)) {
          if (!neededSessions.has(key)) {
            activeTmuxStreams[key].close();
            delete activeTmuxStreams[key];
          }
        }

        dashboard.innerHTML = html;

        // Connect to live tmux sessions
        cardResults.forEach(r => {
          if (r.liveSession) {
            connectTmux(r.liveSession, r.task);
          }
        });
      } catch (err) {
        console.error('Failed to refresh:', err);
      }
    }

    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
